<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>VotoMatch Perú 2026 | Test político</title>

<meta name="description" content="Descubre con qué partido político coincides más en Perú. Test político estilo Wahl-O-Mat para elecciones 2026.">

<meta name="keywords" content="test político Perú, elecciones 2026 Perú, partidos políticos Perú, votación Perú, test ideológico">

<link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/c/cf/Flag_of_Peru.svg">

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
background:#f5f7fb;
margin:0;
padding:20px;
}

.card{
background:white;
max-width:700px;
margin:auto;
padding:28px;
border-radius:18px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h1,h2{
margin-top:0;
}

.header{
font-size:14px;
opacity:0.7;
margin-bottom:10px;
}

button{
width:100%;
padding:16px;
margin-top:10px;
border-radius:14px;
border:none;
font-size:16px;
cursor:pointer;
}

.answer{
background:#f1f5f9;
}

.selected{
background:#4361ee;
color:white;
}

.primary{
background:#4361ee;
color:white;
}

.progress{
height:8px;
background:#e5e7eb;
border-radius:20px;
margin:15px 0 20px 0;
}

.progress div{
height:8px;
background:#4361ee;
border-radius:20px;
}

.logo-box{
text-align:center;
margin-top:25px;
font-weight:bold;
letter-spacing:5px;
opacity:0.4;
}

.top{
display:flex;
align-items:center;
gap:12px;
background:#f0fdf4;
padding:12px;
border-radius:12px;
margin-bottom:12px;
}

.top img{
width:40px;
height:40px;
border-radius:8px;
}

.bar{
height:8px;
background:#e5e7eb;
border-radius:20px;
margin:5px 0 15px 0;
}

.fill{
height:8px;
background:#22c55e;
border-radius:20px;
}

.small{
font-size:13px;
opacity:0.6;
}

</style>

</head>



<body>



<div class="card" id="intro">

<h1>VotoMatch Perú</h1>

<p>
Descubre con qué partido coincides más.
</p>

<button onclick="start()" class="primary">
Empezar test
</button>

<p class="small">
Herramienta informativa.
</p>

</div>



<div class="card" id="quiz" style="display:none">

<div class="header">
🇵🇪 Elecciones 2026
</div>

<button onclick="prev()">
← Anterior
</button>

<h3 id="counter"></h3>

<div class="progress">
<div id="prog"></div>
</div>

<h2 id="q"></h2>

<button id="b2" class="answer" onclick="ans(2)">
De acuerdo
</button>

<button id="b1" class="answer" onclick="ans(1)">
Neutral
</button>

<button id="b0" class="answer" onclick="ans(0)">
En desacuerdo
</button>

<div class="logo-box">
TÚ DECIDES
</div>

</div>




<div class="card" id="res" style="display:none">

<h2>Resultado</h2>

<h3 id="tend"></h3>

<h3>Top coincidencias</h3>

<div id="top3"></div>


<h3>Todos los partidos</h3>

<div id="lista"></div>



<button onclick="share()" class="primary">
Compartir resultado
</button>

<button onclick="location.reload()">
Reiniciar
</button>

</div>





<script>



const preguntas=[

"El Estado debe reducir el déficit fiscal.",
"Aumentar impuestos a minería.",
"Empresas estatales estratégicas.",
"Más tratados de libre comercio.",
"Flexibilidad laboral.",
"Subir salario mínimo.",
"Más rol económico del Estado.",
"Menos impuestos a pymes.",
"Militares contra crimen.",
"Penas más duras.",
"Prevención del delito.",
"Más presupuesto policía.",
"Reforma constitucional.",
"Reelección congresal.",
"Más requisitos a partidos.",
"Más autonomía regional.",
"Más programas sociales.",
"Educación sexual.",
"Unión civil.",
"Restricción minería."

];



const partidos={

"Fuerza Popular":{

respuestas:[2,1,2,2,2,1,1,1,2,2,0,2,0,2,2,1,1,0,0,0],

logo:"https://upload.wikimedia.org/wikipedia/commons/3/34/Fuerza_Popular_logo.png",

candidato:"Keiko Fujimori"

},

"Perú Libre":{

respuestas:[0,2,2,0,0,2,2,1,2,2,1,2,2,0,1,2,2,1,0,1],

logo:"https://upload.wikimedia.org/wikipedia/commons/0/0f/Peru_Libre_logo.png",

candidato:"Vladimir Cerrón"

},

"Partido Morado":{

respuestas:[1,2,1,2,1,2,1,2,1,1,2,1,1,2,2,2,2,2,2,1],

logo:"https://upload.wikimedia.org/wikipedia/commons/5/57/Partido_Morado_logo.png",

candidato:"Julio Guzmán"

},

"APP":{

respuestas:[1,1,2,2,1,2,1,2,2,2,1,2,1,1,2,2,2,1,1,1],

logo:"https://upload.wikimedia.org/wikipedia/commons/0/06/Alianza_para_el_Progreso_logo.png",

candidato:"César Acuña"

},

"Avanza País":{

respuestas:[2,0,0,2,2,0,0,2,2,2,0,2,0,2,2,0,0,1,1,0],

logo:"https://upload.wikimedia.org/wikipedia/commons/1/16/Avanza_Pais_logo.png",

candidato:"Hernando de Soto"

}

};



let i=0;

let resp=[];



function start(){

intro.style.display="none";

quiz.style.display="block";

show();

}



function show(){

counter.innerText=
"Pregunta "+(i+1)+" de "+preguntas.length;

q.innerText=preguntas[i];

prog.style.width=
(i/preguntas.length*100)+"%";

paint();

}



function paint(){

b0.classList.remove("selected");

b1.classList.remove("selected");

b2.classList.remove("selected");

if(resp[i]==0)b0.classList.add("selected");

if(resp[i]==1)b1.classList.add("selected");

if(resp[i]==2)b2.classList.add("selected");

}



function ans(v){

resp[i]=v;

if(i<preguntas.length-1){

i++;

show();

}

else{

calc();

}

}



function prev(){

if(i>0){

i--;

show();

}

}



function calc(){

let resultados=[];



for(let p in partidos){

let puntos=0;



for(let j=0;j<preguntas.length;j++){

puntos+=

2-Math.abs(

resp[j]-partidos[p].respuestas[j]

);

}



resultados.push({

nombre:p,

score:puntos,

logo:partidos[p].logo,

candidato:partidos[p].candidato

});

}



resultados.sort((a,b)=>b.score-a.score);



quiz.style.display="none";

res.style.display="block";



tend.innerText=
"Mayor coincidencia con "+resultados[0].nombre;



let html="";



resultados.slice(0,3)

.forEach(r=>{

let pct=Math.round(r.score/40*100);



html+=`

<div class="top">

<img src="${r.logo}">

<div>

<b>${r.nombre}</b><br>

${r.candidato}<br>

${pct}%

</div>

</div>

`;



});



top3.innerHTML=html;



let listaHTML="";



resultados.forEach(r=>{

let pct=Math.round(r.score/40*100);



listaHTML+=

`<p>${r.nombre} ${pct}%</p>`;



});



lista.innerHTML=listaHTML;



}



function share(){

navigator.clipboard.writeText(location.href);

alert("Link copiado");

}



</script>



</body>
</html>
